<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2k26 GM Grader Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --nba:#1D428A;--nba-light:#e8edf7;--red:#C8102E;--red-light:#fce8eb;
  --bg:#ffffff;--surface:#F7F8FA;--surface2:#EFF1F5;--bd:#E2E5EC;--bd2:#CFD3DC;
  --tx:#0A0A0F;--tx2:#3A3D4A;--mu:#717485;--mu2:#A0A4B4;
  --gold:#B8860B;--gold-light:#FFF8E7;--green:#15803D;
  --orange:#C05C00;--orange-light:#FFF3E8;--err:#C8102E;--err-light:#FEF2F4;
}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:#f0f0f0;}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}
.topbar{background:var(--nba);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:10;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.nba-badge{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.55);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:3px 9px;}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;letter-spacing:0.04em;text-transform:uppercase;color:#fff;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.topbar-chip{display:inline-flex;align-items:center;gap:5px;font-family:'Barlow',sans-serif;font-size:10px;padding:4px 10px;border-radius:4px;border:1px solid;letter-spacing:0.06em;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.topbar-chip.sync{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.85);}
.topbar-chip.sync:hover{background:rgba(255,255,255,0.18);color:#fff;}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.wrap{max-width:900px;margin:0 auto;padding:28px 20px 80px;}
.sec-hdr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;gap:12px;}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;letter-spacing:0.02em;text-transform:uppercase;color:var(--tx);line-height:1;}
.sec-sub{font-family:'Barlow',sans-serif;font-size:10px;color:var(--mu);letter-spacing:0.06em;text-transform:uppercase;margin-top:3px;}
.grade-hdr{text-align:right;}
.grade-hdr-label{font-family:'Barlow',sans-serif;font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px;}
.tabs{display:flex;border-bottom:2px solid var(--bd);margin-bottom:24px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab{font-family:'Barlow',sans-serif;font-size:13px;padding:10px 18px;background:none;border:none;border-bottom:3px solid transparent;color:var(--mu);cursor:pointer;transition:all 0.15s;margin-bottom:-2px;white-space:nowrap;letter-spacing:0.01em;}
.tab.on{color:var(--nba);border-bottom-color:var(--nba);}
.tab:hover:not(.on){color:var(--tx2);}
.card{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:18px;}
.card-shadow{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.clabel{font-family:'Barlow',sans-serif;font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;}
.card p{font-size:13px;color:var(--tx2);line-height:1.8;}
.input-area{display:flex;flex-direction:column;gap:14px;}
.fl{font-family:'Barlow',sans-serif;font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:7px;}
textarea{font-family:'Barlow',sans-serif;font-size:14px;line-height:1.75;color:var(--tx);background:var(--bg);border:1.5px solid var(--bd2);border-radius:8px;padding:14px;width:100%;resize:vertical;transition:border-color 0.15s;}
textarea:focus{outline:none;border-color:var(--nba);}
textarea::placeholder{color:var(--mu2);font-style:italic;font-size:13px;}
.hint{font-size:12px;color:var(--mu);line-height:1.7;padding:11px 14px;background:var(--nba-light);border:1px solid rgba(29,66,138,0.15);border-radius:8px;}
.srow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.sbtn{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;background:var(--nba);color:#fff;border:none;border-radius:7px;padding:11px 28px;cursor:pointer;transition:opacity 0.15s;}
.sbtn:disabled{opacity:0.35;cursor:default;}
.pulsing{font-family:'Barlow',sans-serif;font-size:11px;color:var(--mu);animation:pulse 1.5s infinite;}
.errmsg{font-size:13px;color:var(--err);padding:10px 14px;background:var(--err-light);border:1px solid rgba(200,16,46,0.18);border-radius:7px;}
.warn-box{font-size:12px;color:var(--orange);padding:10px 14px;background:var(--orange-light);border:1px solid rgba(192,92,0,0.2);border-radius:7px;}
.result{display:flex;flex-direction:column;gap:14px;animation:fadeUp 0.3s ease;}
.mtag{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;color:var(--red);text-transform:uppercase;margin-bottom:8px;display:inline-block;background:var(--red-light);padding:3px 8px;border-radius:4px;}
.vcard{background:var(--nba);border-radius:10px;padding:18px;}
.vcard .clabel{color:rgba(255,255,255,0.55);}
.vtext{font-size:17px;color:#fff;line-height:1.4;font-family:'Barlow',sans-serif;}
.grow{display:flex;gap:12px;}
.gbox{background:var(--surface);border:1.5px solid var(--bd);border-radius:10px;padding:18px 14px;text-align:center;flex:1;}
.gval{font-family:'Barlow Condensed',sans-serif;font-size:54px;font-weight:800;line-height:1;margin-top:6px;letter-spacing:-0.01em;}
.tcol{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.capcard{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:18px;}
.caplabel{font-family:'Barlow',sans-serif;font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;}
.capcard p{font-size:13px;color:var(--tx2);line-height:1.8;}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.rgl{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:0.04em;}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.icard{background:var(--surface);border:1px solid var(--bd);border-left:3px solid;border-radius:0 8px 8px 0;padding:11px 13px;margin-bottom:7px;}
.iwho{display:flex;gap:8px;align-items:baseline;margin-bottom:3px;}
.iname{font-size:13px;color:var(--tx);}
.ipub{font-family:'Barlow',sans-serif;font-size:11px;color:var(--mu);}
.iq{font-size:13px;color:var(--tx2);line-height:1.7;font-style:italic;}
.ractions{display:flex;gap:8px;flex-wrap:wrap;}
.gbtn{font-family:'Barlow',sans-serif;font-size:13px;background:none;border:1.5px solid var(--bd2);color:var(--mu);border-radius:7px;padding:8px 15px;cursor:pointer;transition:all 0.15s;}
.gbtn:hover{border-color:var(--bd);color:var(--tx2);}
.ai-summary{background:var(--nba);border-radius:10px;padding:20px;margin-bottom:16px;animation:fadeUp 0.3s ease;}
.ai-summary-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.ai-summary-text{font-size:14px;color:#fff;line-height:1.8;font-weight:400;}
.ai-summary-loading{font-family:'Barlow',sans-serif;font-size:12px;color:rgba(255,255,255,0.5);animation:pulse 1.5s infinite;}
.ai-summary-stale{font-family:'Barlow',sans-serif;font-size:10px;letter-spacing:0.04em;color:rgba(255,255,255,0.4);margin-top:8px;}
.log{display:flex;flex-direction:column;gap:8px;animation:fadeUp 0.3s ease;}
.lsummary{background:var(--surface);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:4px;}
.lstats{display:flex;gap:16px;flex-wrap:wrap;}
.lstat{font-family:'Barlow',sans-serif;font-size:11px;color:var(--mu);}
.lstat span{color:var(--tx);margin-left:4px;}
.litem{background:var(--bg);border:1.5px solid var(--bd);border-radius:10px;padding:14px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s;}
.litem:hover,.litem.active{border-color:var(--nba);box-shadow:0 0 0 3px rgba(29,66,138,0.08);}
.litop{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.lmeta{display:flex;gap:7px;align-items:center;margin-bottom:5px;flex-wrap:wrap;}
.ltype{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.06em;color:var(--red);text-transform:uppercase;background:var(--red-light);padding:2px 7px;border-radius:3px;}
.lts{font-family:'Barlow',sans-serif;font-size:11px;color:var(--mu2);}
.lnotes{font-size:13px;color:var(--tx2);line-height:1.5;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.lverdict{font-size:12px;color:var(--mu);font-style:italic;margin-top:4px;}
.lright{display:flex;gap:8px;flex-shrink:0;align-items:flex-start;}
.lgrades{display:flex;gap:7px;}
.gml{font-size:10px;color:var(--mu);margin-bottom:3px;text-align:center;font-family:'Barlow',sans-serif;letter-spacing:0.04em;}
.delbtn{font-family:'Barlow',sans-serif;font-size:11px;background:none;border:1.5px solid var(--bd2);color:var(--mu2);border-radius:5px;padding:3px 8px;cursor:pointer;transition:all 0.15s;}
.delbtn:hover{border-color:var(--bd2);color:var(--mu);}
.lfooter{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--bd);flex-wrap:wrap;gap:8px;}
.lbtn{font-family:'Barlow',sans-serif;font-size:12px;background:none;border:1.5px solid var(--bd2);color:var(--mu);border-radius:7px;padding:7px 13px;cursor:pointer;transition:all 0.15s;}
.lbtn:hover{border-color:var(--bd2);color:var(--tx2);}
.ibox{background:var(--surface);border:1px solid var(--bd);border-radius:8px;padding:13px;margin-top:4px;}
.rums{display:flex;flex-direction:column;gap:12px;animation:fadeUp 0.3s ease;}
.rumhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.rumbadge{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#6D28D9;text-transform:uppercase;letter-spacing:0.08em;font-weight:600;padding:2px 8px;background:#F5F3FF;border:1px solid rgba(109,40,217,0.22);border-radius:4px;}
.rumitem{background:var(--bg);border:1.5px solid var(--bd);border-left:3px solid #7C3AED;border-radius:0 10px 10px 0;padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.rumtext{font-size:13px;color:var(--tx2);line-height:1.75;font-style:italic;flex:1;}
.pr{display:flex;flex-direction:column;gap:0;animation:fadeUp 0.3s ease;}
.pr-hdr{background:var(--nba);border-radius:10px;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:12px;}
.pr-hl{display:flex;flex-direction:column;gap:3px;}
.pr-htitle{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:0.03em;text-transform:uppercase;color:#fff;}
.pr-hsub{font-family:'Barlow',sans-serif;font-size:11px;color:rgba(255,255,255,0.5);}
.pr-rbadge{display:flex;align-items:center;gap:14px;}
.pr-rnum{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:800;color:#fff;line-height:1;}
.pr-rlabel{font-family:'Barlow',sans-serif;font-size:9px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.1em;}
.pr-rdelta{font-size:13px;margin-top:3px;}
.pr-thead{display:grid;grid-template-columns:48px 30px 1fr 36px 56px;gap:0;background:var(--surface2);padding:8px 16px;border-radius:8px 8px 0 0;border:1px solid var(--bd);}
.pr-th{font-family:'Barlow',sans-serif;font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:0.1em;}
.pr-body{border:1px solid var(--bd);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;}
.pr-row{display:grid;grid-template-columns:48px 30px 1fr 36px 56px;gap:0;padding:11px 16px;border-bottom:1px solid var(--bd);align-items:center;background:var(--bg);transition:background 0.1s;}
.pr-row:hover{background:var(--surface);}
.pr-row.ur{background:rgba(29,66,138,0.05);border-left:3px solid var(--nba);padding-left:13px;}
.pr-row:last-child{border-bottom:none;}
.pr-rank-n{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--mu);}
.pr-rank-n.t3{color:var(--gold);}
.pr-rank-n.u{color:var(--nba);}
.pr-dt{font-size:11px;text-align:center;}
.pr-gm{display:flex;flex-direction:column;gap:2px;}
.pr-gmn{font-size:13px;color:var(--tx);}
.pr-gmn.u{color:var(--nba);}
.pr-gmt{font-size:11px;color:var(--mu);}
.pr-press{display:flex;gap:2px;align-items:center;}
.prdot{width:5px;height:5px;border-radius:50%;}
.pr-g{text-align:right;}
.pill{font-family:'Barlow Condensed',sans-serif;font-weight:700;border-radius:5px;border:1.5px solid;display:inline-block;line-height:1.3;}
.pill-sm{font-size:12px;padding:2px 8px;}
.pill-lg{font-size:26px;padding:4px 12px;line-height:1.15;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:20px;overflow-y:auto;}
.md{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:24px;width:100%;max-width:520px;display:flex;flex-direction:column;gap:14px;box-shadow:0 8px 32px rgba(0,0,0,0.12);margin:auto;max-height:calc(100vh - 40px);overflow-y:auto;}
.md-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;text-transform:uppercase;color:var(--tx);}
.md-actions{display:flex;gap:8px;flex-wrap:wrap;}
.md-btn{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:0.03em;text-transform:uppercase;background:var(--nba);color:#fff;border:none;border-radius:7px;padding:10px 20px;cursor:pointer;transition:opacity 0.15s;}
.md-btn:hover:not(:disabled){opacity:0.88;}
.md-btn.sec{background:none;border:1.5px solid var(--bd2);color:var(--mu);font-family:'Barlow',sans-serif;font-size:14px;letter-spacing:0;text-transform:none;}
.md-btn.sec:hover{border-color:var(--bd2);color:var(--tx2);}
.md-sep{border:none;border-top:1px solid var(--bd);margin:0;}
.empty-state{text-align:center;padding:60px 20px;color:var(--mu);font-size:13px;}
@media(max-width:640px){
  .mo{padding:12px;}.md{padding:18px;gap:12px;border-radius:10px;}
  .wrap{padding:16px 14px 80px;}
  .tcol,.grow,.rgrid{display:flex;flex-direction:column;}
  .topbar{height:auto;padding:10px 14px;flex-wrap:wrap;gap:8px;}
  .topbar-left{gap:8px;}.topbar-title{font-size:15px;}
  .nba-badge{font-size:11px;padding:2px 7px;}
  .topbar-right{width:100%;justify-content:flex-start;gap:6px;}
  .topbar-chip{font-size:9px;padding:3px 8px;}
  .sec-hdr{flex-direction:column;align-items:flex-start;gap:8px;}
  .sec-title{font-size:22px;}.grade-hdr{text-align:left;}
  .tab{font-size:11px;padding:8px 12px;}
  .card,.card-shadow,.capcard,.ai-summary{padding:14px;}
  .gbox{padding:14px 10px;}.gval{font-size:42px;}.vtext{font-size:14px;}
  .rgrid{gap:12px;}.litem{padding:12px;}
  .litop{flex-direction:column;gap:8px;}
  .lright{flex-direction:row;justify-content:space-between;width:100%;}
  .lgrades{gap:12px;}
  .pr-thead,.pr-row{grid-template-columns:34px 22px 1fr 0px 44px;}
  .pr-th:nth-child(4),.pr-row>div:nth-child(4){display:none;}
  .pr-hdr{padding:14px;}.pr-rnum{font-size:32px;}
  .md-title{font-size:18px;}
  .sbtn{width:100%;text-align:center;}
  .srow{flex-direction:column;align-items:stretch;}
  .ractions{flex-direction:column;}.gbtn{text-align:center;}
  .lfooter{flex-direction:column;gap:10px;}.pill-sm{font-size:11px;}
}
.consult{display:flex;flex-direction:column;gap:14px;animation:fadeUp 0.3s ease;}
.consult-card{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:16px;display:flex;gap:14px;align-items:flex-start;}
.consult-avatar{width:40px;height:40px;border-radius:50%;background:var(--surface2);border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.consult-body{flex:1;min-width:0;}
.consult-who{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;flex-wrap:wrap;}
.consult-name{font-size:13px;color:var(--tx);}
.consult-role{font-family:'Barlow',sans-serif;font-size:11px;color:var(--mu);}
.consult-quote{font-size:13px;color:var(--tx2);line-height:1.75;font-style:italic;}
.consult-verdict{background:var(--nba);border-radius:10px;padding:18px;}
.consult-verdict-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.consult-verdict-text{font-size:16px;color:#fff;line-height:1.4;}
.consult-push{display:flex;align-items:center;gap:10px;margin-top:12px;}
.push-yes{background:#15803D;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.05em;padding:8px 18px;border-radius:7px;}
.push-no{background:#C8102E;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.05em;padding:8px 18px;border-radius:7px;}
.push-mixed{background:#C05C00;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.05em;padding:8px 18px;border-radius:7px;}

/* Icon buttons for rumors */
.icon-btn{position:relative;background:none;border:1.5px solid var(--bd2);border-radius:5px;width:28px;height:28px;cursor:pointer;color:var(--mu2);transition:all 0.15s;font-family:'Barlow',sans-serif;font-size:13px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;overflow:visible;}
.icon-btn.resolve{color:#15803D;border-color:rgba(21,128,61,0.3);}
.icon-btn.resolve:hover{background:#F0FAF4;border-color:#15803D;}
.icon-btn.delicon:hover{background:var(--surface2);}
.icon-btn[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);right:0;background:var(--tx);color:#fff;font-size:11px;font-family:'Barlow',sans-serif;padding:5px 10px;border-radius:6px;white-space:nowrap;z-index:200;pointer-events:none;}
.icon-btn[data-tip]:hover::before{content:'';position:absolute;bottom:calc(100% + 3px);right:8px;border:5px solid transparent;border-top-color:var(--tx);z-index:200;}
.rumitem.resolved{opacity:0.45;background:var(--surface);border-left-color:var(--bd2);}
.rumitem.resolved .rumtext{text-decoration:line-through;text-decoration-color:var(--mu2);}
.sync-dot{position:relative;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;cursor:help;border:none;background:none;padding:0;}
.sync-dot[data-tip]:hover::after{content:attr(data-tip);position:absolute;top:calc(100% + 8px);left:0;background:var(--tx);color:#fff;font-size:11px;font-family:'Barlow',sans-serif;padding:5px 10px;border-radius:6px;white-space:nowrap;z-index:300;pointer-events:none;}

function s2g(s){

const MOVE_WEIGHTS={"Trade":1.5,"Free Agent Signing":1.3,"Extension":1.2,"Draft Pick Trade":1.2,"Buyout Claim":1.0,"Waiver Claim":0.8,"Draft Pick":1.0,"Hire/Fire Staff":0.7,"Waive":0.6,"Cap Strategy":0.9};
function computeUserScore(moves){
  // Recency: last3=50%, moves4-8=30%, 9+=20%. Within each bucket: move-type weighted avg.
  if(!moves.length)return 70;
  const scored=moves.map((m,i)=>({s:Number(m.analysis?.gmGrade?.score),t:m.moveType,i})).filter(m=>!isNaN(m.s)&&m.s>0);
  if(!scored.length)return 70;
  const b=[scored.filter(m=>m.i<3),scored.filter(m=>m.i>=3&&m.i<8),scored.filter(m=>m.i>=8)];
  const bw=[0.5,0.3,0.2];
  function bAvg(items){if(!items.length)return null;let tw=0,ts=0;items.forEach(m=>{const w=MOVE_WEIGHTS[m.t]||1.0;tw+=w;ts+=m.s*w;});return ts/tw;}
  let tw=0,ts=0;
  b.forEach((bucket,i)=>{const avg=bAvg(bucket);if(avg!=null){tw+=bw[i];ts+=avg*bw[i];}});
  return tw?Math.round(ts/tw):70;
}
function numAvg(moves,field="gmGrade"){
  const sc=moves.map(m=>m.analysis?.[field]?.score).filter(s=>s!=null&&!isNaN(Number(s))).map(Number);
  return sc.length?Math.round(sc.reduce((a,b)=>a+b,0)/sc.length):null;
}

function encode(m,r,t){
  try{
    const json=JSON.stringify({m,r,t:t||null,v:3});
    return typeof LZString!=='undefined'?LZString.compressToEncodedURIComponent(json):btoa(unescape(encodeURIComponent(json)));
  }catch(e){return null;}
}
function encodeCompact(m,r){
  try{
    const slim={
      m:(m||[]).map(mv=>[mv.id,mv.moveType,mv.timestamp,(mv.notes||'').slice(0,80),
        mv.analysis?.gmGrade?.grade||'',mv.analysis?.gmGrade?.score||0,
        mv.analysis?.tradeRealism?.grade||'',mv.analysis?.tradeRealism?.score||0,
        mv.analysis?.verdict||'']),
      r:(r||[]).map(ru=>[ru.id,(ru.text||'').slice(0,60),ru.timestamp,ru.resolved?1:0]),vc:1
    };
    const json=JSON.stringify(slim);
    const compressed=typeof LZString!=='undefined'?LZString.compressToEncodedURIComponent(json):btoa(unescape(encodeURIComponent(json)));
    return 'Q'+compressed;
  }catch(e){return null;}
}
function decodeCompact(s){
  try{
    const raw=s.slice(1);
    let json=typeof LZString!=='undefined'?LZString.decompressFromEncodedURIComponent(raw):decodeURIComponent(escape(atob(raw)));
    if(!json)throw 0;
    const slim=JSON.parse(json);
    return {
      m:(slim.m||[]).map(([id,moveType,timestamp,notes,gg,gs,rg,rs,verdict])=>({
        id,moveType,timestamp,notes,isCompact:true,
        analysis:{gmGrade:{grade:gg,score:Number(gs),summary:''},tradeRealism:{grade:rg,score:Number(rs),summary:''},
          verdict,capAnalysis:'',bullsReactions:[],otherTeamReactions:[]}
      })),
      r:(slim.r||[]).map(([id,text,timestamp,resolved])=>({id,text,timestamp,resolved:!!resolved}))
    };
  }catch(e){return null;}
}
function decode(s){
  try{
    const raw=s.replace(/\s+/g,'');
    if(raw.startsWith('Q'))return decodeCompact(raw);
    if(raw.includes('#gm:')){return decode(raw.split('#gm:')[1]||'');}
    let json=null;
    if(typeof LZString!=='undefined'){json=LZString.decompressFromEncodedURIComponent(raw);}
    if(!json){try{json=decodeURIComponent(escape(atob(raw)));}catch(e){}}
    if(!json)throw 0;
    const d=JSON.parse(json);
    const moves=d.m||d.moves;const rumors=d.r||d.rumors||[];
    if(!Array.isArray(moves))throw 0;
    return {m:moves,r:rumors,t:d.t||null};
  }catch(e){return null;}
}
async function callClaude(prompt){
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:prompt}]})
  });
  const d=await res.json();
  if(d.error)throw new Error(d.error.message);
  return d.content.filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
}

  const [showChangeTeamConfirm,setShowChangeTeamConfirm]=useState(false);
  // FIX: pendingTeamSwitch is no longer needed for the close-button loop.
  // Kept only to track if user arrived at sync modal via the "switch team" path,
  // so we can show the green "Switch Now" button in the sync modal.
  const [pendingTeamSwitch,setPendingTeamSwitch]=useState(false);

  const [lastSaveTime,setLastSaveTime]=useState(null);

  const [consultLoading,setConsultLoading]=useState(false);
  const [consultResult,setConsultResult]=useState(null);
  const [consultErr,setConsultErr]=useState(null);

  useEffect(()=>{
    async function load(){
      try{
        const hash=window.location.hash;
        if(hash.startsWith('#gm:')){
          const code=hash.slice(4).replace(/\s+/g,'');
          const d=decode(code);
          if(d&&Array.isArray(d.m)&&d.m.length){
            setMoves(d.m);setRumors(d.r||[]);setCur(d.m[0]);
            await Promise.all([wSet(STORAGE_KEY,d.m),wSet(RUMOR_KEY,d.r||[])]);
            history.replaceState(null,'',window.location.pathname+window.location.search);
            if(d.t&&TEAM_DATA[d.t]){setSelectedTeam(d.t);wSet(TEAM_STORAGE_KEY,d.t);}
            setShowTeamPicker(false);
            setShareLoaded(true);setTimeout(()=>setShareLoaded(false),4000);
            setReady(true);return;
          }
        }
      }catch(e){}
      // Load team FIRST so summary generation gets the right team name
      let loadedTeam=null;
      try{const t=await wGet(TEAM_STORAGE_KEY);if(t&&TEAM_DATA[t])loadedTeam=t;}catch(e){}
      if(HWS){
        try{
          const timeout=new Promise(res=>setTimeout(()=>res(null),3000));
          const data=await Promise.race([Promise.all([wGet(STORAGE_KEY),wGet(RUMOR_KEY),wGet(GMSUMM_KEY),wGet(RUMSUMM_KEY)]),timeout]);
          if(Array.isArray(data)){
            const [m,r,gs,rs]=data;
            const teamName=(TEAM_DATA[loadedTeam]||TEAM_DATA.bulls).name;
            if(Array.isArray(m)&&m.length){
              setMoves(m);setCur(m[0]);
              setLastSyncSnapshot({moveCount:m.length,rumorCount:Array.isArray(r)?r.length:0,at:new Date().toLocaleTimeString()});
            }
            if(Array.isArray(r))setRumors(r);
            // Cache-first; generate if missing — this is the main fix for "summary not loading"
            if(gs){setGmSummary(gs);}
            else if(Array.isArray(m)&&m.length){generateGmSummary(m,teamName);}
            if(rs){setRumorSummary(rs);}
            else if(Array.isArray(r)&&r.filter(x=>!x.resolved).length){
              generateRumorSummary(r.filter(x=>!x.resolved),m||[],teamName);
            }
          }
        }catch(e){}
      }
      if(loadedTeam){setSelectedTeam(loadedTeam);}
      else{setShowTeamPicker(true);}
      setReady(true);
    }
    load();
  },[]);

  async function persistMoves(m){const ok=await wSet(STORAGE_KEY,m);setSaveOk(ok?"ok":"fail");if(ok)setLastSaveTime(new Date().toLocaleTimeString());setTimeout(()=>setSaveOk(null),2000);}
  async function persistRumors(r){await wSet(RUMOR_KEY,r);}

  const avgGM=numAvg(moves,"gmGrade");
  const hasUnsyncedChanges=!lastSyncSnapshot||(moves.length!==lastSyncSnapshot.moveCount||rumors.length!==lastSyncSnapshot.rumorCount);
  const avgReal=numAvg(moves,"tradeRealism");
  const overallGrade=s2g(avgGM);
  const userScore=computeUserScore(moves);
  function computeRanks(scoreOvr){const us=scoreOvr!=null?scoreOvr:userScore;return[...LEAGUE_GMS,{name:"YOU",team:(TEAM_DATA[selectedTeam]||TEAM_DATA.bulls).name,score:us,isUser:true}].sort((a,b)=>b.score-a.score);}
  const ranked=computeRanks();
  const userRank=ranked.findIndex(g=>g.isUser)+1;
  let prevRank=null;
  if(moves.length>=2){const prevScore=computeUserScore(moves.slice(1));const pr=computeRanks(prevScore);prevRank=pr.findIndex(g=>g.isUser)+1;}
  const rankDelta=prevRank!=null?prevRank-userRank:0;

  // ── FIX: clearAllAndSwitchTeam — the missing function that actually executes a team switch ──

    setRumorSummary(null);

      wDel(RUMOR_KEY),
      wDel(GMSUMM_KEY),
      wDel(RUMSUMM_KEY),
      wDel(TEAM_STORAGE_KEY)
    ]);
    // Now open the team picker with a clean slate
    setShowTeamPicker(true);
  }

  function getTeamName(){return (TEAM_DATA[selectedTeam]||TEAM_DATA.bulls).name;}

  async function generateGmSummary(allMoves,_teamOverride){
    if(allMoves.length<1)return;setSummLoading(true);
    const teamName=_teamOverride||getTeamName();
    try{

  async function submit(){
    if(!notes.trim()){setErr("Drop your GM notes first.");return;}
    setLoading(true);setErr(null);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1600,messages:[{role:"user",content:buildPrompt()}]})});
      const data=await res.json();
      if(data.error)throw new Error(data.error.message);
      const txt=data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n");
      const cleaned=txt.replace(/```json|```/g,"").trim();
      const s=cleaned.indexOf("{"),e=cleaned.lastIndexOf("}");
      if(s===-1||e===-1)throw new Error("No JSON");
      const analysis=JSON.parse(cleaned.slice(s,e+1));
      if(analysis.tradeRealism?.score)analysis.tradeRealism.score=Number(analysis.tradeRealism.score);
      if(analysis.gmGrade?.score)analysis.gmGrade.score=Number(analysis.gmGrade.score);
      const move={id:Date.now(),notes:notes.trim(),moveType:analysis.moveType,timestamp:new Date().toLocaleString(),analysis};
      const nm=[move,...moves];
      setMoves(nm);setCur(move);setNotes("");setTab("result");
      await persistMoves(nm);generateGmSummary(nm);const ar=rumors.filter(r=>!r.resolved);if(ar.length)generateRumorSummary(ar,nm);
    }catch(e){setErr("Analysis failed: "+e.message);console.error(e);}finally{setLoading(false);}
  }

  function pickConsultVoices(){
    const pool=(TEAM_DATA[selectedTeam]||TEAM_DATA.bulls).voices;
    const fo=pool.filter(v=>v.type==="fo");
    const coach=pool.filter(v=>v.type==="coach");
    const legend=pool.filter(v=>v.type==="legend");
    function rnd(arr,n){const s=[...arr];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s.slice(0,n);}
    return [...rnd(fo,Math.min(3,fo.length)),...rnd(coach,Math.min(1,coach.length)),...rnd(legend,Math.min(3,legend.length))];
  }

      const playerTierCtx="PLAYER VALUATION FRAMEWORK:\nCONTRACT VALUE: Expiring=high trade value, rookie-scale=gold, max on bad deal=liability.\nPLAYER TIER: S-tier (Wembanyama/Jokic/Giannis/SGA/Luka level), A-tier (All-Star), B-tier (starter), C-tier (rotation), D-tier (fringe). Be accurate.\nMEDIA PERCEPTION: National coverage volume = market value. Superstar gets 50+ articles/week vs fringe player gets 2.\nEXEC STANDARD: What do 20 of 30 GMs think? Call it clearly. No hedging on obvious outcomes.\nRECENCY: Current trajectory beats historical reputation.";
      const prompt="CRITICAL: Never refer to the GM making these decisions by any real person's name (do not use Karnisovas, or any current or former real NBA GM's name). Insiders and analysts must refer to the decision-maker only as 'the new GM', 'new management', 'the front office', or '[Team Name] GM'. The person using this tool IS the GM. You are simulating unfiltered private reactions from key "+teamName+" organizational figures evaluating a proposed move in NBA 2K26 franchise mode. Speak authentically as someone associated with that franchise. Do not reference other current real NBA teams or GMs by name.\n\nPROPOSED MOVE: "+consultNotes.trim()+moveCtx+"\n\n"+playerTierCtx+"\n\nVOICES TO SIMULATE (respond for ALL "+voices.length+" in order):\n"+voiceList+"\n\nRESPOND IN THIS EXACT FORMAT using these delimiters precisely, one block per voice:\n\n"+voices.map((v)=>"###VOICE:"+v.name+"\n###QUOTE:2-3 sentences in "+v.name+"s authentic voice reacting to this move").join("\n\n")+"\n\n###VERDICT:2-3 sentences on how the league views this move and its value calculus\n###PUSH:PUSH IT\n###REASON:one sharp sentence explaining the recommendation\n\nFor ###PUSH use exactly one of: PUSH IT, HOLD OFF, PROCEED WITH CAUTION\nBe analytically sharp. Call obvious outcomes clearly. Apply the valuation framework ruthlessly."

      const txt=await callClaude(prompt);
      const voices_=voices;
      const reactions=voices_.map(function(v){
        const marker="###QUOTE:";
        const nameMarker="###VOICE:"+v.name;
        const namePos=txt.indexOf(nameMarker);
        if(namePos===-1){
          const firstName=v.name.split(" ")[0];
          const altPos=txt.indexOf("###VOICE:"+firstName);
          if(altPos===-1)return{name:v.name,quote:"Re-consult to get this reaction."};
          const quotePos=txt.indexOf(marker,altPos);
          if(quotePos===-1)return{name:v.name,quote:"Re-consult to get this reaction."};
          const quoteStart=quotePos+marker.length;
          const quoteEnd=txt.indexOf("\n###",quoteStart);
          return{name:v.name,quote:(quoteEnd===-1?txt.slice(quoteStart):txt.slice(quoteStart,quoteEnd)).trim()};
        }
        const quotePos=txt.indexOf(marker,namePos);
        if(quotePos===-1)return{name:v.name,quote:"Re-consult to get this reaction."};
        const quoteStart=quotePos+marker.length;
        const quoteEnd=txt.indexOf("\n###",quoteStart);
        return{name:v.name,quote:(quoteEnd===-1?txt.slice(quoteStart):txt.slice(quoteStart,quoteEnd)).trim()};
      });
      const verdictPos=txt.indexOf("###VERDICT:");
      const pushPos=txt.indexOf("###PUSH:");
      const reasonPos=txt.indexOf("###REASON:");
      const leagueVerdict=verdictPos!==-1?txt.slice(verdictPos+11,pushPos!==-1?pushPos:undefined).trim():"See individual reactions above.";
      const pushVerdict=pushPos!==-1?txt.slice(pushPos+8,reasonPos!==-1?reasonPos:undefined).trim().split("\n")[0].toUpperCase():"PROCEED WITH CAUTION";
      const pushReason=reasonPos!==-1?txt.slice(reasonPos+10).trim().split("\n")[0]:"Re-consult for a sharper recommendation.";
      const pv=pushVerdict.includes("PUSH")&&!pushVerdict.includes("CAUTION")?"PUSH IT":pushVerdict.includes("HOLD")?"HOLD OFF":"PROCEED WITH CAUTION";
      setConsultResult({reactions,leagueVerdict,pushVerdict:pv,pushReason,voices:voices_,notes:consultNotes.trim()});
    }catch(e){setConsultErr("Consult failed: "+e.message);console.error(e);}

    const d=decode(raw);
    if(!d){setSyncErr("Invalid code — paste the full Q... sync code.");return;}

    const newMoves=d.m||[];

    const newActive=newRumors.filter(r=>!r.resolved);

    // Resolve team name NOW from the decoded data (before any setState call)

    const restoredTeamName=(TEAM_DATA[restoredTeam]||TEAM_DATA.bulls).name;

    // Set all state
    setMoves(newMoves);
    setRumors(newRumors);
    if(newMoves.length)setCur(newMoves[0]);

    // Persist to cloud
    await persistMoves(newMoves);
    await persistRumors(newRumors);

    // Mark sync as current immediately — the loaded data IS the sync code
    setLastSyncSnapshot({moveCount:newMoves.length,rumorCount:newRumors.length,at:new Date().toLocaleTimeString()});

    // Set team
    if(restoredTeam&&TEAM_DATA[restoredTeam]){

    }else{
      setSelectedTeam(null);
      wDel(TEAM_STORAGE_KEY);

    // so we don't depend on React state having updated yet
    const [cachedGS,cachedRS]=await Promise.all([wGet(GMSUMM_KEY),wGet(RUMSUMM_KEY)]);
    if(cachedGS){setGmSummary(cachedGS);}
    else if(newMoves.length){generateGmSummary(newMoves,restoredTeamName);}
    if(cachedRS){setRumorSummary(cachedRS);}
    else if(newActive.length){generateRumorSummary(newActive,newMoves,restoredTeamName);}

    setSyncPaste("");

    setPendingTeamSwitch(false);
    if(!restoredTeam||!TEAM_DATA[restoredTeam]){setShowTeamPicker(true);}
  }
