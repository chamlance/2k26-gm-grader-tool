<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2k26 GM Grader Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --nba:#1D428A;--nba-light:#e8edf7;--red:#C8102E;--red-light:#fce8eb;
  --bg:#ffffff;--surface:#F7F8FA;--surface2:#EFF1F5;--bd:#E2E5EC;--bd2:#CFD3DC;
  --tx:#0A0A0F;--tx2:#3A3D4A;--mu:#717485;--mu2:#A0A4B4;
  --gold:#B8860B;--gold-light:#FFF8E7;--green:#15803D;
  --orange:#C05C00;--orange-light:#FFF3E8;--err:#C8102E;--err-light:#FEF2F4;
}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:#f0f0f0;}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}
.topbar{background:var(--nba);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:10;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.nba-badge{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.55);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:3px 9px;}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;letter-spacing:0.04em;text-transform:uppercase;color:#fff;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.topbar-chip{display:inline-flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:10px;padding:4px 10px;border-radius:4px;border:1px solid;letter-spacing:0.04em;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.topbar-chip.sync{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.85);}
.topbar-chip.sync:hover{background:rgba(255,255,255,0.18);color:#fff;}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.wrap{max-width:900px;margin:0 auto;padding:28px 20px 80px;}
.sec-hdr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;gap:12px;}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;letter-spacing:0.02em;text-transform:uppercase;color:var(--tx);line-height:1;}
.sec-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mu);letter-spacing:0.06em;text-transform:uppercase;margin-top:3px;}
.grade-hdr{text-align:right;}
.grade-hdr-label{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;}
.tabs{display:flex;border-bottom:2px solid var(--bd);margin-bottom:24px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab{font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;padding:10px 18px;background:none;border:none;border-bottom:3px solid transparent;color:var(--mu);cursor:pointer;transition:all 0.15s;margin-bottom:-2px;white-space:nowrap;letter-spacing:0.01em;}
.tab.on{color:var(--nba);border-bottom-color:var(--nba);}
.tab:hover:not(.on){color:var(--tx2);}
.card{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:18px;}
.card-shadow{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.clabel{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;}
.card p{font-size:13px;color:var(--tx2);line-height:1.8;}
.input-area{display:flex;flex-direction:column;gap:14px;}
.fl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:7px;}
textarea{font-family:'Barlow',sans-serif;font-size:14px;line-height:1.75;color:var(--tx);background:var(--bg);border:1.5px solid var(--bd2);border-radius:8px;padding:14px;width:100%;resize:vertical;transition:border-color 0.15s;}
textarea:focus{outline:none;border-color:var(--nba);}
textarea::placeholder{color:var(--mu2);font-style:italic;font-size:13px;}
.hint{font-size:12px;color:var(--mu);line-height:1.7;padding:11px 14px;background:var(--nba-light);border:1px solid rgba(29,66,138,0.15);border-radius:8px;}
.srow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.sbtn{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;background:var(--nba);color:#fff;border:none;border-radius:7px;padding:11px 28px;cursor:pointer;transition:opacity 0.15s;}
.sbtn:disabled{opacity:0.35;cursor:default;}
.pulsing{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mu);animation:pulse 1.5s infinite;}
.errmsg{font-size:13px;color:var(--err);padding:10px 14px;background:var(--err-light);border:1px solid rgba(200,16,46,0.18);border-radius:7px;}
.warn-box{font-size:12px;color:var(--orange);padding:10px 14px;background:var(--orange-light);border:1px solid rgba(192,92,0,0.2);border-radius:7px;}
.result{display:flex;flex-direction:column;gap:14px;animation:fadeUp 0.3s ease;}
.mtag{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--red);font-weight:600;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;display:inline-block;background:var(--red-light);padding:3px 8px;border-radius:4px;}
.vcard{background:var(--nba);border-radius:10px;padding:18px;}
.vcard .clabel{color:rgba(255,255,255,0.55);}
.vtext{font-size:17px;font-weight:700;color:#fff;line-height:1.4;font-family:'Barlow',sans-serif;}
.grow{display:flex;gap:12px;}
.gbox{background:var(--surface);border:1.5px solid var(--bd);border-radius:10px;padding:18px 14px;text-align:center;flex:1;}
.gval{font-family:'Barlow Condensed',sans-serif;font-size:54px;font-weight:800;line-height:1;margin-top:6px;letter-spacing:-0.01em;}
.tcol{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.capcard{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:18px;}
.caplabel{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;}
.capcard p{font-size:13px;color:var(--tx2);line-height:1.8;}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.rgl{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:0.04em;}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.icard{background:var(--surface);border:1px solid var(--bd);border-left:3px solid;border-radius:0 8px 8px 0;padding:11px 13px;margin-bottom:7px;}
.iwho{display:flex;gap:8px;align-items:baseline;margin-bottom:3px;}
.iname{font-weight:700;font-size:13px;color:var(--tx);}
.ipub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mu);}
.iq{font-size:13px;color:var(--tx2);line-height:1.7;font-style:italic;}
.ractions{display:flex;gap:8px;flex-wrap:wrap;}
.gbtn{font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;background:none;border:1.5px solid var(--bd2);color:var(--mu);border-radius:7px;padding:8px 15px;cursor:pointer;transition:all 0.15s;}
.gbtn:hover{border-color:var(--nba);color:var(--nba);}
.gbtn.danger:hover{border-color:rgba(200,16,46,0.4);color:var(--red);}
.gbtn.conf{border-color:rgba(200,16,46,0.4)!important;color:var(--red)!important;}
.ai-summary{background:var(--nba);border-radius:10px;padding:20px;margin-bottom:16px;animation:fadeUp 0.3s ease;}
.ai-summary-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.ai-summary-text{font-size:14px;color:#fff;line-height:1.8;font-weight:400;}
.ai-summary-loading{font-family:'IBM Plex Mono',monospace;font-size:12px;color:rgba(255,255,255,0.5);animation:pulse 1.5s infinite;}
.ai-summary-stale{font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,0.4);margin-top:8px;}
.log{display:flex;flex-direction:column;gap:8px;animation:fadeUp 0.3s ease;}
.lsummary{background:var(--surface);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:4px;}
.lstats{display:flex;gap:16px;flex-wrap:wrap;}
.lstat{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mu);}
.lstat span{color:var(--tx);margin-left:4px;}
.litem{background:var(--bg);border:1.5px solid var(--bd);border-radius:10px;padding:14px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s;}
.litem:hover,.litem.active{border-color:var(--nba);box-shadow:0 0 0 3px rgba(29,66,138,0.08);}
.litop{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.lmeta{display:flex;gap:7px;align-items:center;margin-bottom:5px;flex-wrap:wrap;}
.ltype{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--red);font-weight:600;text-transform:uppercase;letter-spacing:0.07em;background:var(--red-light);padding:2px 7px;border-radius:3px;}
.lts{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mu2);}
.lnotes{font-size:13px;color:var(--tx2);line-height:1.5;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.lverdict{font-size:12px;color:var(--mu);font-style:italic;margin-top:4px;font-weight:500;}
.lright{display:flex;gap:8px;flex-shrink:0;align-items:flex-start;}
.lgrades{display:flex;gap:7px;}
.gml{font-size:10px;color:var(--mu);margin-bottom:3px;text-align:center;font-family:'IBM Plex Mono',monospace;}
.delbtn{font-family:'IBM Plex Mono',monospace;font-size:11px;background:none;border:1.5px solid var(--bd2);color:var(--mu2);border-radius:5px;padding:3px 8px;cursor:pointer;transition:all 0.15s;}
.delbtn:hover,.delbtn.conf{border-color:rgba(200,16,46,0.35);color:var(--red);}
.lfooter{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--bd);flex-wrap:wrap;gap:8px;}
.lbtn{font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;background:none;border:1.5px solid var(--bd2);color:var(--mu);border-radius:7px;padding:7px 13px;cursor:pointer;transition:all 0.15s;}
.lbtn:hover{border-color:var(--nba);color:var(--nba);}
.ibox{background:var(--surface);border:1px solid var(--bd);border-radius:8px;padding:13px;margin-top:4px;}
.rums{display:flex;flex-direction:column;gap:12px;animation:fadeUp 0.3s ease;}
.rumhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.rumbadge{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#6D28D9;text-transform:uppercase;letter-spacing:0.08em;font-weight:600;padding:2px 8px;background:#F5F3FF;border:1px solid rgba(109,40,217,0.22);border-radius:4px;}
.rumitem{background:var(--bg);border:1.5px solid var(--bd);border-left:3px solid #7C3AED;border-radius:0 10px 10px 0;padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.rumtext{font-size:13px;color:var(--tx2);line-height:1.75;font-style:italic;flex:1;}
.pr{display:flex;flex-direction:column;gap:0;animation:fadeUp 0.3s ease;}
.pr-hdr{background:var(--nba);border-radius:10px;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:12px;}
.pr-hl{display:flex;flex-direction:column;gap:3px;}
.pr-htitle{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:0.03em;text-transform:uppercase;color:#fff;}
.pr-hsub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,0.5);}
.pr-rbadge{display:flex;align-items:center;gap:14px;}
.pr-rnum{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:800;color:#fff;line-height:1;}
.pr-rlabel{font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.1em;}
.pr-rdelta{font-size:13px;font-weight:700;margin-top:3px;}
.pr-thead{display:grid;grid-template-columns:48px 30px 1fr 36px 56px;gap:0;background:var(--surface2);padding:8px 16px;border-radius:8px 8px 0 0;border:1px solid var(--bd);}
.pr-th{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:0.08em;}
.pr-body{border:1px solid var(--bd);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;}
.pr-row{display:grid;grid-template-columns:48px 30px 1fr 36px 56px;gap:0;padding:11px 16px;border-bottom:1px solid var(--bd);align-items:center;background:var(--bg);transition:background 0.1s;}
.pr-row:hover{background:var(--surface);}
.pr-row.ur{background:rgba(29,66,138,0.05);border-left:3px solid var(--nba);padding-left:13px;}
.pr-row:last-child{border-bottom:none;}
.pr-rank-n{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--mu);}
.pr-rank-n.t3{color:var(--gold);}
.pr-rank-n.u{color:var(--nba);}
.pr-dt{font-size:11px;font-weight:700;text-align:center;}
.pr-gm{display:flex;flex-direction:column;gap:2px;}
.pr-gmn{font-size:13px;font-weight:700;color:var(--tx);}
.pr-gmn.u{color:var(--nba);}
.pr-gmt{font-size:11px;color:var(--mu);}
.pr-press{display:flex;gap:2px;align-items:center;}
.prdot{width:5px;height:5px;border-radius:50%;}
.pr-g{text-align:right;}
.pill{font-family:'IBM Plex Mono',monospace;font-weight:600;border-radius:5px;border:1.5px solid;display:inline-block;line-height:1.3;}
.pill-sm{font-size:13px;padding:2px 9px;}
.pill-lg{font-size:28px;padding:4px 14px;line-height:1.15;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:20px;overflow-y:auto;}
.md{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:24px;width:100%;max-width:520px;display:flex;flex-direction:column;gap:14px;box-shadow:0 8px 32px rgba(0,0,0,0.12);margin:auto;max-height:calc(100vh - 40px);overflow-y:auto;}
.md-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;text-transform:uppercase;color:var(--tx);}
.md-actions{display:flex;gap:8px;flex-wrap:wrap;}
.md-btn{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:0.03em;text-transform:uppercase;background:var(--nba);color:#fff;border:none;border-radius:7px;padding:10px 20px;cursor:pointer;}
.md-btn.sec{background:none;border:1.5px solid var(--bd2);color:var(--mu);font-weight:600;font-family:'Barlow',sans-serif;font-size:13px;letter-spacing:0;text-transform:none;}
.md-sep{border:none;border-top:1px solid var(--bd);margin:0;}
.empty-state{text-align:center;padding:60px 20px;color:var(--mu);font-size:13px;}
@media(max-width:640px){
  .mo{padding:12px;}.md{padding:18px;gap:12px;border-radius:10px;}
  .wrap{padding:16px 14px 80px;}
  .tcol,.grow,.rgrid{display:flex;flex-direction:column;}
  .topbar{height:auto;padding:10px 14px;flex-wrap:wrap;gap:8px;}
  .topbar-left{gap:8px;}.topbar-title{font-size:15px;}
  .nba-badge{font-size:11px;padding:2px 7px;}
  .topbar-right{width:100%;justify-content:flex-start;gap:6px;}
  .topbar-chip{font-size:9px;padding:3px 8px;}
  .sec-hdr{flex-direction:column;align-items:flex-start;gap:8px;}
  .sec-title{font-size:22px;}.grade-hdr{text-align:left;}
  .tab{font-size:11px;padding:8px 12px;}
  .card,.card-shadow,.capcard,.ai-summary{padding:14px;}
  .gbox{padding:14px 10px;}.gval{font-size:42px;}.vtext{font-size:14px;}
  .rgrid{gap:12px;}.litem{padding:12px;}
  .litop{flex-direction:column;gap:8px;}
  .lright{flex-direction:row;justify-content:space-between;width:100%;}
  .lgrades{gap:12px;}
  .pr-thead,.pr-row{grid-template-columns:34px 22px 1fr 0px 44px;}
  .pr-th:nth-child(4),.pr-row>div:nth-child(4){display:none;}
  .pr-hdr{padding:14px;}.pr-rnum{font-size:32px;}
  .md-title{font-size:18px;}
  .sbtn{width:100%;text-align:center;}
  .srow{flex-direction:column;align-items:stretch;}
  .ractions{flex-direction:column;}.gbtn{text-align:center;}
  .lfooter{flex-direction:column;gap:10px;}.pill-sm{font-size:11px;}
}
.consult{display:flex;flex-direction:column;gap:14px;animation:fadeUp 0.3s ease;}
.consult-card{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:16px;display:flex;gap:14px;align-items:flex-start;}
.consult-avatar{width:40px;height:40px;border-radius:50%;background:var(--surface2);border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.consult-body{flex:1;min-width:0;}
.consult-who{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;flex-wrap:wrap;}
.consult-name{font-size:13px;font-weight:700;color:var(--tx);}
.consult-role{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mu);}
.consult-quote{font-size:13px;color:var(--tx2);line-height:1.75;font-style:italic;}
.consult-verdict{background:var(--nba);border-radius:10px;padding:18px;}
.consult-verdict-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.consult-verdict-text{font-size:16px;font-weight:700;color:#fff;line-height:1.4;}
.consult-push{display:flex;align-items:center;gap:10px;margin-top:12px;}
.push-yes{background:#15803D;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.05em;padding:8px 18px;border-radius:7px;}
.push-no{background:#C8102E;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.05em;padding:8px 18px;border-radius:7px;}
.push-mixed{background:#C05C00;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.05em;padding:8px 18px;border-radius:7px;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef,useCallback,useMemo,createElement:h,Fragment}=React;
const STORAGE_KEY="gmgrader-v5-moves";
const RUMOR_KEY="gmgrader-v5-rumors";
const GMSUMM_KEY="gmgrader-v5-gmsumm";
const RUMSUMM_KEY="gmgrader-v5-rumsumm";
const NBA_BLUE="#1D428A";
const NBA_RED="#C8102E";

const LEAGUE_GMS=[
  {name:"Sam Presti",title:"GM",team:"Oklahoma City Thunder",score:97,articles:94},
  {name:"Brad Stevens",title:"President",team:"Boston Celtics",score:95,articles:91},
  {name:"Masai Ujiri",title:"President",team:"Toronto Raptors",score:92,articles:87},
  {name:"Pat Riley",title:"President",team:"Miami Heat",score:91,articles:89},
  {name:"Zach Kleiman",title:"President",team:"Memphis Grizzlies",score:89,articles:73},
  {name:"Tim Connelly",title:"President",team:"Minnesota Timberwolves",score:87,articles:71},
  {name:"Daryl Morey",title:"President",team:"Philadelphia 76ers",score:86,articles:90},

function decode(s){

    if(raw.includes('#gm:')){return decode(raw.split('#gm:')[1]||'');}

    if(typeof LZString!=='undefined'){json=LZString.decompressFromEncodedURIComponent(raw);}
    if(!json){try{json=decodeURIComponent(escape(atob(raw)));}catch(e){}}

    const moves=d.m||d.moves;const rumors=d.r||d.rumors||[];

}
async function callClaude(prompt){

}

    async function load(){
      try{
        const hash=window.location.hash;
        if(hash.startsWith('#gm:')){
          const code=hash.slice(4).replace(/\s+/g,'');
          const d=decode(code);
          if(d&&Array.isArray(d.m)&&d.m.length){
            setMoves(d.m);setRumors(d.r||[]);setCur(d.m[0]);
            await Promise.all([wSet(STORAGE_KEY,d.m),wSet(RUMOR_KEY,d.r||[])]);
            history.replaceState(null,'',window.location.pathname+window.location.search);
            if(d.t&&TEAM_DATA[d.t]){setSelectedTeam(d.t);wSet(TEAM_STORAGE_KEY,d.t);}
            setShowTeamPicker(false);
            setShareLoaded(true);setTimeout(()=>setShareLoaded(false),4000);
            setReady(true);return;
          }
        }
      }catch(e){}
      if(HWS){
        try{
          const timeout=new Promise(res=>setTimeout(()=>res(null),3000));
          const data=await Promise.race([Promise.all([wGet(STORAGE_KEY),wGet(RUMOR_KEY),wGet(GMSUMM_KEY),wGet(RUMSUMM_KEY)]),timeout]);
          if(Array.isArray(data)){
            const [m,r,gs,rs]=data;
            if(Array.isArray(m)&&m.length){setMoves(m);setCur(m[0]);}
            if(Array.isArray(r))setRumors(r);
            if(gs)setGmSummary(gs);
            if(rs)setRumorSummary(rs);
          }
        }catch(e){}
      }
      // Load selected team
      try{
        const t=await wGet(TEAM_STORAGE_KEY);
        if(t)setSelectedTeam(t);
        else setShowTeamPicker(true);
      }catch(e){setShowTeamPicker(true);}
      setReady(true);
    }
    load();
  },[]);



  async function persistMoves(m){const ok=await wSet(STORAGE_KEY,m);setSaveOk(ok?"ok":"fail");setTimeout(()=>setSaveOk(null),2000);}
  async function persistRumors(r){await wSet(RUMOR_KEY,r);}
  const avgGM=numAvg(moves,"gmGrade");
  const hasUnsyncedChanges=!lastSyncSnapshot||(moves.length!==lastSyncSnapshot.moveCount||rumors.length!==lastSyncSnapshot.rumorCount);
  const avgReal=numAvg(moves,"tradeRealism");
  const overallGrade=s2g(avgGM);
  function computeRanks(scoreOvr){const us=scoreOvr!=null?scoreOvr:(avgGM!=null?avgGM:70);return[...LEAGUE_GMS,{name:"YOU",team:(TEAM_DATA[selectedTeam]||TEAM_DATA.bulls).name,score:us,isUser:true}].sort((a,b)=>b.score-a.score);}
  const ranked=computeRanks();
  const userRank=ranked.findIndex(g=>g.isUser)+1;
  let prevRank=null;
  if(moves.length>=2){const ps=numAvg(moves.slice(1),"gmGrade");const pr=computeRanks(ps!=null?ps:70);prevRank=pr.findIndex(g=>g.isUser)+1;}
  const rankDelta=prevRank!=null?prevRank-userRank:0;

  async function generateGmSummary(allMoves){
    if(allMoves.length<1)return;setSummLoading(true);
    try{
      const recent=allMoves.slice(0,5);
      const prompt=`You are an expert NBA analyst writing a brief insider assessment of a Chicago Bulls GM in NBA 2K26 franchise mode.\n\nHere are the GM's most recent moves (latest first):\n${recent.map((m,i)=>`${i+1}. [${m.moveType}] Realism:${m.analysis?.tradeRealism?.grade}(${m.analysis?.tradeRealism?.score}) | GM Grade:${m.analysis?.gmGrade?.grade}(${m.analysis?.gmGrade?.score})\n   Notes: ${m.notes.slice(0,200)}\n   Verdict: ${m.analysis?.verdict}`).join("\n\n")}\n\nWrite a 3-5 sentence insider summary assessing what this GM is doing. IMPORTANT: Arturas Karnisovas is no longer with the Bulls — do NOT mention him. The Bulls have a new GM. Be specific — reference 1-2 of his actual moves. Characterize what mode he is in (e.g. buying, selling, aggressive rebuild, hot seat, under management pressure, rising from the ranks, excellence). Write as if you are an NBA insider columnist — sharp, direct, opinionated. No bullet points. Plain prose only.`;
      const text=await callClaude(prompt);setGmSummary(text);await wSet(GMSUMM_KEY,text);
    }catch(e){console.error("GM summary failed",e);}finally{setSummLoading(false);}
  }
  async function generateRumorSummary(allRumors,allMoves){
    if(allRumors.length<1)return;setRumSummLoading(true);
    try{
      const recent=allRumors.slice(0,5);
      const moveCtx=allMoves.slice(0,3).map(m=>`[${m.moveType}] ${m.analysis?.verdict}`).join("; ");
      const prompt=`You are an NBA insider summarizing the current situation around the Chicago Bulls based on war room rumors and recent moves.\n\nActive rumors (latest first):\n${recent.map((r,i)=>`${i+1}. ${r.text}`).join("\n")}\n\nRecent moves context: ${moveCtx||"No moves logged yet."}\n\nWrite a 3-5 sentence insider summary of the Bulls' organizational situation right now. Be specific — reference 1-2 of the actual rumors. Characterize where the team and ownership stands (e.g. championship push, tanking, losing skid, 10-game win streak, player development mode, dysfunctional locker room, ownership friction, etc.). Write as if you are an NBA insider columnist — sharp, direct, opinionated. No bullet points. Plain prose only.`;
      const text=await callClaude(prompt);setRumorSummary(text);await wSet(RUMSUMM_KEY,text);
    }catch(e){console.error("Rumor summary failed",e);}finally{setRumSummLoading(false);}
  }

  function buildPrompt(){
    const bp=pick(BP,3),lp=pick(LP,3);
    const hist=moves.length?"\n\nPrevious moves:\n"+moves.slice(0,8).map((m,i)=>`${i+1}. [${m.moveType}] Realism:${m.analysis?.tradeRealism?.grade}(${m.analysis?.tradeRealism?.score}) GM:${m.analysis?.gmGrade?.grade}(${m.analysis?.gmGrade?.score}) — ${m.analysis?.verdict}`).join("\n"):"";
    const rc=rumors.length?"\n\nWar room rumors:\n"+rumors.slice(0,5).map(r=>`- ${r.text}`).join("\n"):"";
    return `You are a hard-grading NBA analyst and cap expert evaluating a Chicago Bulls GM move in NBA 2K26 franchise mode.\n\nIMPORTANT CONTEXT: Arturas Karnisovas is no longer with the Bulls organization. The GM being evaluated here is a new front office executive. Do NOT reference Karnisovas in any reactions or analysis.\n\nGM Notes:\n---\n${notes.trim()}\n---\n${hist}${rc}\n\nInstructions:\n1. Identify move type (ONE): Trade, Free Agent Signing, Extension, Waiver Claim, Draft Pick Trade, Buyout Claim, Draft Pick, Hire/Fire Staff, Waive, Cap Strategy\n\n2. GRADE STRICTLY:\n   - A-range (87-100): Franchise-altering elite decisions only. Rare.\n   - B-range (77-86): Solid, genuinely improves the team\n   - C-range (67-76): Mediocre — gets something done but at real cost\n   - D/F (below 67): Overpay, bad value, or strategically incoherent\n   Default: most moves are B or C. Award A only if truly excellent.\n\n3. Generate reactions from EXACTLY these insiders:\n   Bulls: ${bp.map(i=>`${i.n} (${i.p})`).join(", ")}\n   League: ${lp.map(i=>`${i.n} (${i.p})`).join(", ")}\n\nRespond ONLY raw JSON, no markdown:\n\n{"moveType":"Trade","tradeRealism":{"grade":"B","score":81,"summary":"2-3 sentences"},"gmGrade":{"grade":"B-","score":79,"summary":"2-3 sentences"},"bullsReactions":[{"insider":"${bp[0].n}","publication":"${bp[0].p}","reaction":"1-2 sentences"},{"insider":"${bp[1].n}","publication":"${bp[1].p}","reaction":"1-2 sentences"},{"insider":"${bp[2].n}","publication":"${bp[2].p}","reaction":"1-2 sentences"}],"otherTeamReactions":[{"insider":"${lp[0].n}","publication":"${lp[0].p}","reaction":"1-2 sentences"},{"insider":"${lp[1].n}","publication":"${lp[1].p}","reaction":"1-2 sentences"},{"insider":"${lp[2].n}","publication":"${lp[2].p}","reaction":"1-2 sentences"}],"capAnalysis":"2 sentences","verdict":"Max 10 words"}`;
  }

  async function submit(){
    if(!notes.trim()){setErr("Drop your GM notes first.");return;}
    setLoading(true);setErr(null);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1600,messages:[{role:"user",content:buildPrompt()}]})});
      const data=await res.json();
      if(data.error)throw new Error(data.error.message);
      const txt=data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n");
      const cleaned=txt.replace(/```json|```/g,"").trim();
      const s=cleaned.indexOf("{"),e=cleaned.lastIndexOf("}");
      if(s===-1||e===-1)throw new Error("No JSON");
      const analysis=JSON.parse(cleaned.slice(s,e+1));
      if(analysis.tradeRealism?.score)analysis.tradeRealism.score=Number(analysis.tradeRealism.score);
      if(analysis.gmGrade?.score)analysis.gmGrade.score=Number(analysis.gmGrade.score);
      const move={id:Date.now(),notes:notes.trim(),moveType:analysis.moveType,timestamp:new Date().toLocaleString(),analysis};
      const nm=[move,...moves];
      setMoves(nm);setCur(move);setNotes("");setTab("result");
      await persistMoves(nm);generateGmSummary(nm);
    }catch(e){setErr("Analysis failed: "+e.message);console.error(e);}finally{setLoading(false);}
  }

  function pickConsultVoices(){
    const pool=(TEAM_DATA[selectedTeam]||TEAM_DATA.bulls).voices;
    const fo=pool.filter(v=>v.type==="fo");
    const coach=pool.filter(v=>v.type==="coach");
    const legend=pool.filter(v=>v.type==="legend");
    function rnd(arr,n){const s=[...arr];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s.slice(0,n);}
    return [...rnd(fo,Math.min(3,fo.length)),...rnd(coach,Math.min(1,coach.length)),...rnd(legend,Math.min(3,legend.length))];
  }

  async function submitConsult(){
    if(!consultNotes.trim()){setConsultErr("Describe the move you are considering.");return;}
    setConsultLoading(true);setConsultErr(null);setConsultResult(null);
    try{
      const voices=pickConsultVoices();
      const moveCtx=moves.length
        ? "\n\nRecent moves context: "+moves.slice(0,4).map((m,i)=>((i+1)+". ["+m.moveType+"] "+(m.analysis?.verdict||""))).join(", ")
        : "";
      const voiceList=voices.map((v,i)=>((i+1)+". "+v.name+" ("+v.role+")")).join("\n");


      const teamName=(TEAM_DATA[selectedTeam]||TEAM_DATA.bulls).name;
      const playerTierCtx="PLAYER VALUATION FRAMEWORK:\nCONTRACT VALUE: Expiring=high trade value, rookie-scale=gold, max on bad deal=liability.\nPLAYER TIER: S-tier (Wembanyama/Jokic/Giannis/SGA/Luka level), A-tier (All-Star), B-tier (starter), C-tier (rotation), D-tier (fringe). Be accurate.\nMEDIA PERCEPTION: National coverage volume = market value. Superstar gets 50+ articles/week vs fringe player gets 2.\nEXEC STANDARD: What do 20 of 30 GMs think? Call it clearly. No hedging on obvious outcomes.\nRECENCY: Current trajectory beats historical reputation.";
      const prompt="You are simulating unfiltered private reactions from key "+teamName+" organizational figures evaluating a proposed move in NBA 2K26 franchise mode. Speak authentically as someone associated with that franchise. Do not reference other current real NBA teams or GMs by name.\n\nPROPOSED MOVE: "+consultNotes.trim()+moveCtx+"\n\n"+playerTierCtx+"\n\nVOICES TO SIMULATE (respond for ALL "+voices.length+" in order):\n"+voiceList+"\n\nRESPOND IN THIS EXACT FORMAT using these delimiters precisely, one block per voice:\n\n"+voices.map((v)=>"###VOICE:"+v.name+"\n###QUOTE:2-3 sentences in "+v.name+"s authentic voice reacting to this move").join("\n\n")+"\n\n###VERDICT:2-3 sentences on how the league views this move and its value calculus\n###PUSH:PUSH IT\n###REASON:one sharp sentence explaining the recommendation\n\nFor ###PUSH use exactly one of: PUSH IT, HOLD OFF, PROCEED WITH CAUTION\nBe analytically sharp. Call obvious outcomes clearly. Apply the valuation framework ruthlessly."

      const txt=await callClaude(prompt);

      // Parse the delimited format - completely immune to JSON/apostrophe issues
      const voices_=voices;
      const reactions=voices_.map(function(v){
        const marker="###QUOTE:";
        const nameMarker="###VOICE:"+v.name;
        const namePos=txt.indexOf(nameMarker);
        if(namePos===-1){
          // Try first name match
          const firstName=v.name.split(" ")[0];
          const altPos=txt.indexOf("###VOICE:"+firstName);
          if(altPos===-1)return{name:v.name,quote:"Re-consult to get this reaction."};
          const quotePos=txt.indexOf(marker,altPos);
          if(quotePos===-1)return{name:v.name,quote:"Re-consult to get this reaction."};
          const quoteStart=quotePos+marker.length;
          const quoteEnd=txt.indexOf("\n###",quoteStart);
          return{name:v.name,quote:(quoteEnd===-1?txt.slice(quoteStart):txt.slice(quoteStart,quoteEnd)).trim()};
        }
        const quotePos=txt.indexOf(marker,namePos);
        if(quotePos===-1)return{name:v.name,quote:"Re-consult to get this reaction."};
        const quoteStart=quotePos+marker.length;
        const quoteEnd=txt.indexOf("\n###",quoteStart);
        return{name:v.name,quote:(quoteEnd===-1?txt.slice(quoteStart):txt.slice(quoteStart,quoteEnd)).trim()};
      });

      const verdictPos=txt.indexOf("###VERDICT:");
      const pushPos=txt.indexOf("###PUSH:");
      const reasonPos=txt.indexOf("###REASON:");

      const leagueVerdict=verdictPos!==-1
        ? txt.slice(verdictPos+11,pushPos!==-1?pushPos:undefined).trim()
        : "See individual reactions above.";
      const pushVerdict=pushPos!==-1
        ? txt.slice(pushPos+8,reasonPos!==-1?reasonPos:undefined).trim().split("\n")[0].toUpperCase()
        : "PROCEED WITH CAUTION";
      const pushReason=reasonPos!==-1
        ? txt.slice(reasonPos+10).trim().split("\n")[0]
        : "Re-consult for a sharper recommendation.";

      // Normalize pushVerdict to exactly one of three values
      const pv=pushVerdict.includes("PUSH")&&!pushVerdict.includes("CAUTION")?"PUSH IT":
               pushVerdict.includes("HOLD")?"HOLD OFF":"PROCEED WITH CAUTION";

      setConsultResult({reactions,leagueVerdict,pushVerdict:pv,pushReason,voices:voices_,notes:consultNotes.trim()});
    }catch(e){setConsultErr("Consult failed: "+e.message);console.error(e);}
    finally{setConsultLoading(false);}
  }

          consultErr&&h("p",{className:"errmsg",style:{marginTop:10}},consultErr),
          h("div",{className:"srow",style:{marginTop:12}},
            h("button",{className:"sbtn",disabled:consultLoading,onClick:submitConsult},consultLoading?"Consulting…":"Consult Org"),
            consultLoading&&h("span",{className:"pulsing"},"Running the valuation…"))),

        /* Result */
        consultResult&&h(Fragment,null,

          /* Verdict banner */
          h("div",{className:"consult-verdict"},
            h("div",{className:"consult-verdict-label"},h("span",null,"◈"),"Org Verdict"),
            h("div",{className:"consult-verdict-text"},consultResult.leagueVerdict),
            h("div",{className:"consult-push"},
              h("span",{className:consultResult.pushVerdict==="PUSH IT"?"push-yes":consultResult.pushVerdict==="HOLD OFF"?"push-no":"push-mixed"},consultResult.pushVerdict),
              h("span",{style:{fontSize:13,color:"rgba(255,255,255,0.8)",lineHeight:1.5}},consultResult.pushReason))),

          /* Section: Front Office & Coaches */
          h("div",{style:{fontFamily:"IBM Plex Mono,monospace",fontSize:10,color:"var(--mu)",textTransform:"uppercase",letterSpacing:"0.1em",marginTop:4}},"From the Org"),

                h("div",{className:"consult-who"},
                  h("span",{className:"consult-name"},voice.name),
                  h("span",{className:"consult-role"},voice.role)),
                h("div",{className:"consult-quote"},'"'+reaction.quote+'"')));
          }),

          /* Section: Legends */
          h("div",{style:{fontFamily:"IBM Plex Mono,monospace",fontSize:10,color:"var(--mu)",textTransform:"uppercase",letterSpacing:"0.1em",marginTop:4}},"Legends"),
          consultResult.voices&&consultResult.reactions&&consultResult.voices.filter(v=>v.type==="legend").map((voice,i)=>{
            const reaction=consultResult.reactions.find(r=>r.name===voice.name);

              h("div",{className:"consult-avatar",style:{background:"var(--nba-light)",borderColor:"var(--nba)"}},voice.emoji),
              h("div",{className:"consult-body"},
                h("div",{className:"consult-who"},
                  h("span",{className:"consult-name"},voice.name),
                  h("span",{className:"consult-role"},voice.role)),
                h("div",{className:"consult-quote"},'"'+reaction.quote+'"')));
          }),

          /* New consult button */
          h("button",{className:"gbtn",style:{alignSelf:"flex-start"},onClick:()=>{setConsultResult(null);setConsultNotes("");}  },"Consult on a different move"))),

      tab==="rankings"&&h("div",{className:"pr"},
        h("div",{className:"pr-hdr"},
          h("div",{className:"pr-hl"},h("div",{className:"pr-htitle"},"NBA GM Power Rankings"),h("div",{className:"pr-hsub"},"Rank updates on each move · Based on avg GM grade")),
          moves.length>0&&h("div",{className:"pr-rbadge"},
            h("div",null,h("div",{className:"pr-rlabel"},"Your Rank"),h("div",{className:"pr-rnum"},"#"+userRank),h("div",{className:"pr-rdelta",style:{color:rankDelta>0?"#4ade80":rankDelta<0?"#f87171":"rgba(255,255,255,0.5)"}},rankDelta>0?"▲ "+rankDelta:rankDelta<0?"▼ "+Math.abs(rankDelta):"— unchanged")),
            h("div",null,h("div",{className:"pr-rlabel"},"Avg Grade"),h(Pill,{grade:overallGrade,size:"lg"})))),

        h("div",{className:"pr-thead"},h("div",{className:"pr-th"},"Rank"),h("div",{className:"pr-th"},"±"),h("div",{className:"pr-th"},"GM / Front Office"),h("div",{className:"pr-th",style:{textAlign:"center"}},"Press"),h("div",{className:"pr-th",style:{textAlign:"right"}},"Grade")),

              h("div",{className:"pr-gm"},h("div",{className:"pr-gmn"+(gm.isUser?" u":"")},gm.isUser?"► YOU — "+(TEAM_DATA[selectedTeam]||TEAM_DATA.bulls).name+" GM":gm.name),h("div",{className:"pr-gmt"},(gm.isUser?(TEAM_DATA[selectedTeam]||TEAM_DATA.bulls).name:(gm.team+" · "+gm.title)))),

              h("div",{className:"pr-g"},grade?h(Pill,{grade}):h("span",{style:{color:"#CFD3DC",fontFamily:"IBM Plex Mono,monospace",fontSize:11}},"—")));
          })))

  );
}
ReactDOM.render(h(App),document.getElementById("root"));
</script>
